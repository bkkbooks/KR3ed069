body:
  text: 急救溯原時行霍亂及痧脹溫疫諸病其最關緊急判死生於頃刻之間者莫如閉痧而救閉之藥非倉猝所可辦故欲制丸散以濟世急者莫如先備開閉之藥但閉症有寒熱二種勢同冰炭倘以熱治熱以寒治寒則是助邪為虐害必更烈讀近日外間所送痧藥丸藥諸方雖皆屬有驗之陳方而藥味則率多燥烈施之風餐露宿受寒濕為病者固頗合宜若施於感暑燥熱而成者則大相悖謬而今年夏暑太酷加以亢旱不雨秋燥又甚其為病也寒濕當少燥暑必多苟寒熱不分但以一種燥烈之藥混同概治恐非徒無益而又害之矣惟是患病之家既不能識寒熱之情形而送藥者又不能深諳醫藥況博施濟衆之事又焉能盡人人而問之誠恐功不補過矣豈送藥之本心哉鄙人之意不若制寒熱通用之藥以濟世急惟太乙紫金丹一方薛一瓢稱其比蘇合丸而不熱較至寶丹而不涼兼玉樞丹之解毒備二方之開閉洵濟生之仙品立八百功之上藥足可內服又有飛龍奪命丹一方王夢隱稱其芳杳闢穢化毒祛邪宣氣通營尤妙在人中白一味駕輕就熟為使迅掃濁邪下趨濁道有馬到成功之捷其全體大用有斬關奪隘之功而具起死回生之力足可外吹二方藥味不熱不寒寒症熱症均可通用實為兩便急宜修合以濟急需博愛好善之士能選料預製而廣傳之其利溥矣按市售痧藥者莫若揀選道地藥品依法預製四方丹藥以備應急固可濟世又能銷售豈非雙方並進有利無害之善舉哉然較之痧氣丸功用大相徑庭痧氣丸中茅朮雄黃冰麝蟾酥等僅治寒濕受病而暑熱症用之是抱薪救火往往誤事以上四方寒熱皆宜今特揭出以廣其傳播云爾辨證要訣當稽寒閉熱閉二症以紫金飛龍二丹相通應用可無貽害惟更有慮者閉症與脫症每每相似苟系脫症而與以閉症之藥則又速其死矣醫者臨證務要確切辨明形症然後用之若遇索藥之人尤當問明病原與之庶不致誤茲列形狀於右閉症形象手指麻木神迷似昏瓜色或板或青心胸或煩或痞其劇者四肢如冰兩手無脈神情躁亂口噤難言面色或紫漲或灰垢而呆腹中或脹或痛顛倒不安而悶或唇口瓜甲皆青手面皆黑甚則神昏不省其脫症形象亦往往大略相同但脫症汗多閉症汗少閉症神識多於迷濛脫症神識多於清爽閉症小便短澀赤黃脫症小便清長不熱脫症舌胎多於宣潤而和閉症舌胎不拘或黃或白必黏膩渾濁閉症之脈忽然便無脫症之脈漸次而絶以此數款辨之似可無所逃情按此篇是辨症絶大之關鍵死生之出入也要在細心體認庶免貽誤之憾至於閉症與脫症與尋常霍亂有間又不可不知也然辨別之訣宜研究於初候自無惑焉若初起才覺吐瀉但見手腳作麻胸口滿悶頭目昏蒙面色或灰垢或紫漲兩眼白睛泛紅更問其先覺神氣如蒙渾渾然如處雲霧者便是時行霍亂蓋感受穢濁時氣也如無自覺神氣如蒙若云若霧面色紫漲手足心如烙等症便是尋常霍亂也急救閉症方寒閉熱閉均可通用此下三方用以救急太乙紫金丹治霍亂痧脹時氣溫疫嵐障中惡暑濕溫疫之邪瀰漫熏蒸神明昏亂諸症山慈菰二兩川文蛤二兩紅芽大戟一兩五錢安息香一兩五錢蘇合油一兩五錢千金霜一兩血琥珀五錢上梅片三錢當門子三錢白檀香一兩五錢明雄黃飛淨五錢十一味共研極細末研勻濃糯米飲杵丸如緑豆大外以飛真金為衣每服錢許涼開水下孕婦忌服此方藥料甚貴有力者能合全料更妙否則合半料或合十分之一均量力而可也蓋此種閉症不多俟送完接續再合亦無不可飛龍奪命丹治感受溫暑障疫穢惡陰晦諸邪霍亂輕筋痧脹㽲痛腹中急痛也心腹悶塞煩躁顛倒小安手面遍身青黑四肢水冷兩手無脈瞀亂昏狂神昏危急及時症逆傳神迷狂譫機竅閉塞諸症硃砂飛二錢西牛黃二分當門子三分真珠三分人中白漂煆八分明雄黃飛一分杜蟾酥一分五釐蓬砂三分梅水四分明礬五分燈心炭一錢火硝一分五釐牙皂三分麻黃去節四分青黛飛五分飛真金三十頁十六味各研極細末合研勻瓷罐緊收毋令泄氣以少許吹鼻取嚏重者再用涼開水調服一分小兒減半孕婦忌服凡遇神昏不省或雖省而自覺如蒙如霧渾渾不清兩手忽然無脈肢冷無汗小便短澀赤黃舌胎不拘何色必黏膩渾濁再兼見上條方下所注症候者均宜急與此丹如遇神氣清爽自汗甚多小便清長不熱舌胎宣潤而利兩手脈逐漸細小非忽然便無者便是脫症切不可再與此丹切囑速效丹治諸痧手足麻木牙關緊急目閉不語胸背有紅點或咽腫心痛及風餐露宿塞暑雜感危急之症北細辛三錢五分枯礬一錢五分貫衆二錢製半夏二錢白芷一錢牙皂三錢五分陳皮二錢薄荷葉二錢防風二錢廣木香二錢硃砂二錢五分甘草二錢桔梗二錢十三味共研細末瓷罐緊裝母令泄氣每用三分吹入鼻孔寒濕內盛而病重者開水調服一錢孕婦有忌服紫金丹奪命丹者則以此速效丹代之按此方即道光元年治麻腳瘟之方載在瘟疫彙編其藥計十五味照此方多降香藿香雄黃三味少廣木香一味今世施送改名雷擊散如合此方即將明雄等三味補入亦無不可此方價值甚廉功效亦著施之風餐露宿之人感穢濁惡氣而為痧脹霍亂諸病氣機閉塞者亦頗合宜不妨多為修臺以補四鄉廣送也定亂丸此方用以祛病治伏暑霍亂及時行溫熱疫癘般霍亂初起才覺手腳作麻胸口滿悶頭目昏眩神氣如蒙若云若霧隨即吐瀉交作便宜服之並治感冒穢濁邪氣寒痧脹痧症脹症俱有寒熱二種及寒暑雜感伏暑化疫等症香薷一錢澤瀉二錢真廣木香四分磨入廣陳皮一錢小川連五分白檀香四分磨入紫蘇梗八分磨入生香附二錢白茯苓三錢上朴五分炒山梔二錢江西香豉四錢甜白朮一錢五分白萹豆一錢生甘草二錢五分生香附二錢真廣藿香二錢照方配十劑或五劑研細末水法為丸每服三錢用真廣藿香二錢真陳皮一錢五分煎湯送下如舌黃心煩者加益元散三錢晚蠶沙四五錢同煎如胸悶氣塞者加苦桔梗二錢枇杷葉去毛三錢蟬退二錢同煎加腹痛者加石菖蒲八分白蔻仁五分省頭草二錢同煎腹脹者加水炒川厚朴五分大腹皮二錢同煎爽受水毒者加貫衆三錢同煎以上數方閉症可用脫症切不可川而閉症與脫症形象往往相似不可不慎思而明辨之治時行霍亂簡便章程痧症有寒熱二種霍亂有風寒暑濕溫熱疫癘數種至於吐利腹痛似霍亂而非真霍亂者則其種類尤多令人一見吐瀉先事驚慌針刺亂施痧藥亂服不但無濟恐反誤事故特將是否此症形狀開明遇此病者照單對證用法開列於後一才覺吐瀉但見手腳作麻胸口滿悶頭目昏蒙面色或灰垢或紫漲兩眼白睛泛紅更問其自覺神氣如蒙若云若霧者便是感受穢濁時氣或成痧症或成霍亂急宜內外兩治再解散病人頭髮細看如有赤色者即拔去之再脫其衣細看胸背如有長毛數莖必盡拔之此熱毒深入營分也一外用皂角末或通關散或痧藥吹鼻取嚏即紅靈丹塘西丸一取嚏不問有無隨繼以刮凡肩頸脊背胸前脅肋兩肘灣兩膝灣等處皆宜用磁碗口或厚邊青銅錢蘸菜油自上向下刮之以紅紫色綻方止景嶽云凡毒深病急者非刮背不可以五臟之系咸附於背也按五臟六腑皆繫於背刮法誠解毒散邪之捷法前哲用之屢效一刮後繼之以刺今世針法失傳凡須放瘀者往往取材於修發匠多不知穴道在何地方但孟浪下針以多為貴實屬有損無益不若用刮法為妙惟少商尺澤曲池委中四處自家人亦可會謹開部位於右少商在手大指頭內側去爪甲角如韭葉尺澤在兩肘灣約文中曲池在肘外輔骨屈肘曲骨之中委中在兩膝灣按此四穴乃痧疫轉危為安之捷徑刮後凡兒有紅筋紫梗起或露出紅點即用銀針輕輕刺破擠出惡血一於吹鼻後用刮法一面用天水半碗煎百沸如無天水河水亦可新汲井水半碗和勻令病人服下或少刻再服一碗稍停又連進一碗此名生熟水一服生熟水後看其情形如病勢緩者即用定亂丸一付或連服二三付用廣陳皮廣藿香煎湯送下一二日內忌食米粥湯如飢用冬瓜茲仁煮湯代之一周時內忌食米粥一病勢重急者毒邪犯髒髒氣閉塞經腧不通死亡頃刻是為閉症外用痧藥吹鼻內急服太乙紫金丹或磨玉樞丹濯之玉樞丹即紫金錠丸藥店有現成者孕婦忌服另以速效丹代之其證四肢如冰兩手無脈忽然便無非逐漸細小而絶者神情躁亂目陷聲嘶唇口爪甲皆青手面皆黑甚至神昏不省者其轉筋腹痛則或兼或否但驗其吐出酸穢瀉下臭惡如火小便點滴黃赤熱短面色紫眼睛紅舌胎黃膩或白厚黏濁者為感受熱毒瀉水不臭小水清白舌胎灰白潮薄口中生水雖渴而不欲多飲者為感受陰毒熱閉宜用八寶紅靈丹紫雪丹陰閉宜用霹歷散蟾酥丸回陽膏之類但病家茫昧者多況倉猝之際恐難辨別不若用玉樞丹太乙紫金丹不問寒熱均叮無礙一吐瀉太多元氣耗散肢體加冰冷汗頻出脈微欲脫者是為脫症急宜大劑參附理中四逆回陽等法救之外用回陽膏貼臍中即時下施送之硫黃散又名感應靈丹孕婦忌貼一霍亂轉筋吐下已多脈無氣短大汗欲絶者置好醋二三斤於病人面前將鐵器燒紅頻淬醋內使聞其氣節可轉危為安足冷者另搗生附子二兩貼湧泉穴其穴在兩足心再接症用藥以挽回元氣不論寒熱二種凡元氣欲脫者皆當亟用此法並治産後昏量一心煩腹中絞痛吐瀉不出者名乾霍亂用食鹽一撮放刀頭上用火炙透以新汲水百沸湯各半碗和服取吐或用刀頭燒鹽和熱童便服之此上諸法專為危急之際倉皇失措而設俾人略知定向免得因驚致亂因亂致誤也至於病之變化無窮一面當延醫辨症用藥又非徒此所可專恃耳以上辨症救急諸方系壬子歲霍亂盛行費養莊先生選訂近年歲氣雖與壬子不同然其邪亦寒熱錯雜之邪蓋近數年清明以後雷既發聲雪猶疊降穀雨以後亢旱月餘芒種以後大雨兼旬與純乎寒濕者亦不同近年所治名以寒熱互用獲效燥烈之藥亦非所宜仍須制寒熱通用之藥以濟斯厄共登仁壽之宇曉瀾識時其餘未盡之旨各方藥列入後篇者系余録驗選集以補費氏所未備曉瀾再志咸豐辛酉中秋後十日記於祟川雅竹齊中摘録霍亂論守險預防要法一食井中每交夏令宜入白礬雄黃之整塊者解水毒而闢蛇虺也水缸內宜浸石菖蒲根降香一天時潮蒸室中宜焚大黃茵陳之類亦可以解穢氣或以艾搓為繩點之亦佳一用川椒為末時塗鼻孔則穢氣不吸入矣如覺稍吸穢惡即服玉樞丹數分即藥店之紫金錠且宜稍忍飢俾其即時解散切勿遽食尤忌補物恐其助桀為虐奸細來而得內應也一無論老少強弱之人虛實寒熱之體常以枇杷葉煎湯代茗可杜一切外感時邪此葉天士先生法也見醫案存真然必慎起居節飲食勿謂有葉先生法在諸可廢弛也一無論貧富夏月宜供饌者冬醃乾菜蘆蔔芹荀冬瓜瓠𤬛及緑豆黃豆所造諸物人人可食且無流弊肉食者鄙焉知此味嗚呼苟能常咬菜根則百事可做豈但性靈不為淚沒足以御揮霍披亂之災乎再酒性純陽大冷不冰造酒之屋木尚漸腐生物酒浸皆能漸熟不但能腐人腸也然嚴寒之令略飲可御風寒卒犯飛尸溫服可祛陰氣若縱飲無節未有不致病者又惟夏月為尤甚蓋疫癘皆是熱濁穢毒之氣所釀同氣相求感受甚易且酒之濕熱久蓄於內一旦因邪氣入之而為一家其勢必劇其治較難其愈不易縱性耽麴蘖甘醉死而不辭者夏令必須戒飲或不屈死於揮霍撩亂之中也又鰻鱓性熱肋陽鱉性寒滋陰然或有毒者夏令更有蛇變者尤勿輕嘗即無毒者其質味濃厚膩滯難消如吸外邪而誤食之皆難救治市脯尤覺穢濁咸宜杜絶選方十九首暑熱霍亂主治方白虎湯傷寒論治暑熱熾盛而為霍亂者石膏一斤知母六兩甘草炙二兩粳米六合水一斗煮米熟湯成去滓溫服一升日三服按治霍亂粳米須用陳倉者最妙以苡仁代之既叮利濕且能舒筋又不犯米飲守中留邪之虞白虎加人參湯傷寒論治證如前而元氣已虛者原方加人參三兩王夢隱謂白虎湯神於解熱妙用無窮加人參則補氣以生津加桂枝則和螢而化瘧加蒼朮則清濕而治痿變而為竹葉石膏湯則為熱病後之補劑余因推廣其義凡暑熱霍亂之兼表邪者加香薷蘇葉之類轉筋之熱極似寒非反佐莫能深入者少加細辛威靈仙之類痰濕阻滯者加厚朴半夏之類血虛內熱者加生地地丁之類中虛氣弱者加白朮茲仁之類病衰而氣短精乏者加大棗枸杞之類無不奏效如神也竹葉石膏湯傷寒論治中虛暑熱霍亂及霍亂已定而餘熱未清虛贏少氣者竹葉二握生石膏一斤半夏半升洗人參三兩麥門冬一升粳米半升甘草炙二兩水一斗先煮六味取六升去滓內粳米煮米熟湯成去米溫服一升日三服按集驗云此方加生薑治嘔最良王盂英謂治霍亂宜用地漿煎更妙桂苓甘露飲河間治暑熱夾濕之霍亂桂去皮白朮豬苓各五錢茯苓去皮澤瀉各一兩寒水石石膏甘草炙各二兩一方甘草一兩五錢滑石四兩九味為末每用三錢溫水或新汲水或生薑湯量證調下小兒每服一錢接此方一名桂苓白朮散一方不用豬苓或云去豬苓加人參名桂苓白朮散六一散河間即益元散一名天水散桂府膩白滑石六兩甘草炙一兩二味為末每三錢溫水或新汲水調下日三服挾表邪者以蔥白五寸豆豉五十粒煎湯調下按益元散內有硃砂左金丸川連六兩吳茱萸取陳而開口者一兩二味同煮乾為細末米飲糊丸緑豆大每三錢陳木瓜五錢煎湯下吐酸者竹茹生苡仁各三錢煎湯下黃芩定亂湯夢隱治溫病轉為霍亂腹不痛而肢冷脈伏或肢不冷而口渴苔黃小水不行神情煩躁黃芩酒炒焦梔子香豉炒各一錢五分原蠶砂三錢製半夏橘紅鹽水炒各一錢蒲公英四錢川連薑汁炒六分鮮竹茹二錢陳吳萸泡淡一分陰陽水二盞煎一盞候溫徐服轉筋者加生苡仁八錢絲瓜絡三錢溺行者用木瓜三錢濕盛者加連翹茵陳各三錢蠶矢湯霍亂論治霍亂轉筋肢冷腹痛口渴煩躁目陷脈伏時行急證晚蠶砂五錢生苡仁大豆黃卷各四錢陳木瓜三錢川連薑汁炒二錢製半夏黃芩酒炒遍草各一錢焦梔一錢五分陳吳萸泡淡三分用地漿或陰陽水煎稍涼徐服解毒活血湯夢隱治溫暑痧邪深入營分轉筋吐下肢厥汁多脈伏溺無口渴腹痛面黑目陷勢極可危之證連翹絲瓜絡淡紫菜各三錢石菖蒲一錢川連吳萸水炒二錢地丁原蠶砂益母草各五錢生苡仁八錢銀花四錢地漿或陰陽水煮生緑豆四兩取清湯煎藥利入生藕汁或白茅根汁童便一杯稍涼徐徐服昌陽瀉心湯夢隱治霍亂後胸前痞塞湯水礙下或渴或厄石菖蒲黃芩酒炒製半夏各一錢川連薑汁炒五六分蘇葉三四分製厚朴八分鮮竹茹枇杷葉刷去毛各二錢蘆根一兩天雨水急火煎徐徐溫服小溲祕澀者加紫苑接汪謝城謂此方甚妙地漿千金黃土地作坎深三尺以新汲井水沃入攪之少頃取清者飲三五杯寒濕霍亂主治方四苓散溫疫論治濕盛霍亂胸悶溺澀而渴者茯苓豬苓澤瀉橘皮水煎服王夢隱謂吳氏五苓去桂而治胃中濕熱最為有見且以橘皮易術則無實中之弊而有利氣之功當變而變斯為善用古法欲平霍亂者宜知所趨鄉矣按此方變化加減可應無窮之用誠良醫之濟世苦心也理中湯傷寒論治寒霍亂口不渴者人參甘草白朮乾薑各三兩四味搗篩為末蜜和丸雞黃大以沸湯數合和一丸研碎溫服之日三夜二服中未熱益至三四丸然不及湯湯法以味依兩數切用水八升煮中三升去滓溫服一升日三服加減法詳載傷寒論集中四逆湯傷寒論治陰寒霍亂汗出而四肢拘急小便復利脈微欲絶而無頭痛口渴等症生附子一枚乾薑一兩五錢甘草炙二兩水三升煮取一升二合去滓分溫再服強人可用大附子一枚乾薑三兩通脈四逆加豬膽汁湯傷寒論治陰寒霍亂愈後四肢拘急脈微欲絶者前方加豬膽汁半合利服無豬膽以羊膽代之按羊膽代豬膽若非冬令羊膽更難於豬膽況羊性熱豬性涼不能相代或編集者未及三復而載之今特訂正附子粳米湯金匱治中寒霍亂肢冷腹痛吐少嘔多者附子薑汁炮切法夏薑汁炒甘草炙各三錢大棗十枚擘粳米半升水五升煮米熟湯成去滓溫服一升冷香飲子治陰寒霍亂腹痛脈沉細或弦緊無汗惡寒面色如土四肢厥逆陽氣大虛之症甘草附子草果仁橘紅各一錢生薑五片水煎冷服平胃散局方治濕盛於中霍亂吐濁茅朮去粗皮米泔浸五兩紫厚朴去皮薑汁炒陳皮去白各三兩二錢甘草炙二兩四味為末每服二錢水一盞姜一片煎七分服轉筋者加木瓜本方加霍香半夏名金不換正氣散霍香正氣散治濕蘊於中寒襲其外而為霍亂吐瀉者厚朴陳皮桔梗白朮半夏各二兩霍香三兩大腹皮一本作蒼朮或用檳榔亦可白芷茯苓蘇葉各三兩甘草一兩炙十一味為粗末每三錢姜三片棗一枚煎服按蘭臺軌範此方無白朮若易茅朮尤佳王夢隱謂上二方皆治風寒外感食滯內停或兼濕邪或吸穢氣或傷生冷或不服水土等證的是良方若溫暑熱證不兼寒濕者在所切禁今人謂其統治四時感證不審病情一概濫用殊可笑也用治霍亂薑棗宜裁痧疫回春散治寒濕霍亂吐瀉脈沉肢冷目陷肌肉漸次消鑠等症俗名鬼偷肉川厚朴薑製一兩廣藿梗白檀杳制茅朮各一兩製半夏一兩五錢新會皮一兩宣木瓜一兩淡吳萸五錢川椒種八錢制附片八錢高良薑八錢烏梅肉八錢廣木香五錢臺烏片五錢共研極細末每服三錢重者加倍開水煎調服原方載於武林項君爾康所刊同壽録中屢試屢驗之良方惟寒濕證尤捷若挾暑熱者切勿沾唇霍亂轉筋外沽法凡霍亂轉筋者亟以手蘸鹽滷撲之久久自定如無鹽滷即用新汲井水和食鹽亦效又法用燈芯一撮搓成團用真高粱酒燉溫摩擦轉筋處亦良方也按治霍亂往往誤投燥熱者多未將寒熱分別施治惟近醫王孟隱學超前哲立法選方專為補偏救弊而設亦因世俗專執桂附一方統治一切霍亂緣立病情治法醫案藥方四種分門別類痛切直言以濟世人之厄惜其書不易得尚無刊本也蓋霍亂一證其來太驟施治稍遲辨證稍忽挽救為難特其編帙繁多閲者或難細審今特擇其明晰簡要治法寒熱平穩藥方參以臨證心得實驗方法彙集一編俾可一覽瞭然分別施治庶不致以藥誤人若編首所載四方藥味和平寒熱兼治然非倉卒可辦況藥料貴重惟冀仁人君子量力製備刊明藥味證治廣為傳播洵造福無涯矣曉瀾又識
